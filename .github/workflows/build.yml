name: Build

on:
  release:
    types: [created]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: |
          pyinstaller --windowed --onedir -y \
            --name "IVS Conversion App" \
            --icon icon.ico \
            --add-data "icon.png:." \
            --add-data "check.png:." \
            main.py

      - name: Zip .app
        run: |
          cd dist
          zip -r "IVS-Conversion-App-macOS.zip" "IVS Conversion App.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IVS-Conversion-App-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --windowed --onefile -y `
            --name "IVS Conversion App" `
            --icon icon.ico `
            --add-data "icon.png;." `
            --add-data "check.png;." `
            main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IVS Conversion App.exe
